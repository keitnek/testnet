<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu8086 Web Bot - Cập nhật</title>
    <style>
        body { background: #0f3460; color: #fff; text-align: center; font-family: 'Arial'; padding: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 15px; display: inline-block; width: 300px; margin-top: 50px; border: 2px solid #e94560; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input, select, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; font-size: 1rem; }
        button { background: #e94560; color: white; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        button:hover { opacity: 0.8; }
        
        /* Kiểu dáng cho các ô nhập */
        input[type="number"], select { background: #0f3460; color: #fff; border: 1px solid #4caf50; }
        
        /* Khu vực kết quả mới */
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; border: 1px solid #e94560; background: #0f3460; }
        .hidden { display: none; } /* Ẩn khu vực kết quả khi chưa chơi */
        
        /* Kiểu dáng cho con số quay/xúc sắc to lớn */
        .dice-display { 
            font-size: 60px; /* Số to lớn */
            font-weight: bold; 
            color: #f9a825; /* Màu vàng */
            font-family: 'Courier New', monospace; /* Kiểu chữ máy tính */
            padding: 10px;
            background: rgba(0,0,0,0.5); /* Nền tối mờ */
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* Màu sắc cho kết quả */
        .win { color: #4caf50; font-weight: bold; }
        .lose { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💰 VÍ: <span id="bal">0</span> VNĐ</h2>
        <input type="number" id="bet" placeholder="Nhập tiền cược..." min="1000">
        <select id="choice">
            <option value="1">Tài (0-4)</option>
            <option value="2">Xỉu (5-9)</option>
            <option value="3">Chẵn (0,2,4,6,8)</option>
            <option value="4">Lẻ (1,3,5,7,9)</option>
        </select>
        <button onclick="startGame()">ĐẶT CƯỢC</button>
        
        <div id="res-box" class="result-box hidden">
            <div id="dice-display" class="dice-display">00</div>
            <p id="detail"></p>
            <h2 id="result-text"></h2>
        </div>
    </div>

    <script>
        function updateStatus() {
            // Lấy dữ liệu ví từ server Flask (main.py)
            fetch('/get_data').then(r => r.json()).then(d => {
                document.getElementById('bal').innerText = d.balance.toLocaleString();
            });
        }
        updateStatus(); // Lấy số dư khi vừa mở trang

        let rollInterval; // Biến để lưu interval hiệu ứng quay số

        function startGame() {
            const betInput = document.getElementById('bet');
            const choiceInput = document.getElementById('choice');
            const resBox = document.getElementById('res-box');
            const diceDisplay = document.getElementById('dice-display');
            const detailP = document.getElementById('detail');
            const resultH2 = document.getElementById('result-text');

            const bet = betInput.value;
            const choice = choiceInput.value;

            // Kiểm tra dữ liệu hợp lệ
            if (!bet || bet <= 0) {
                alert("Vui lòng nhập số tiền cược hợp lệ!");
                return;
            }

            // 1. Khởi động hiệu ứng quay số
            resBox.classList.remove('hidden'); // Hiển thị khu vực kết quả
            resultH2.innerText = "Đang quay..."; // Thông báo đang quay
            resultH2.className = ""; // Xóa class màu
            detailP.innerText = ""; // Xóa chi tiết cũ

            rollInterval = setInterval(() => {
                // Quay nhanh, thay đổi số ngẫu nhiên 00-99 mỗi 50ms
                let randomNum = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                diceDisplay.innerText = randomNum;
            }, 50);

            // 2. Gửi yêu cầu cược đến server Flask (main.py)
            fetch('/play', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({bet: bet, choice: choice})
            })
            .then(r => r.json())
            .then(d => {
                // 3. Xử lý phản hồi
                clearInterval(rollInterval); // Dừng hiệu ứng quay số ngay khi có kết quả từ server

                if(d.error) {
                    alert(d.error);
                    resBox.classList.add('hidden'); // Ẩn nếu có lỗi
                    updateStatus(); // Cập nhật ví (có thể mất phí)
                } else {
                    updateStatus(); // Cập nhật ví sau khi thắng/thua
                    diceDisplay.innerText = d.number; // Hiển thị con số kết quả thật
                    // Tạo detail string từ dữ liệu
                    let detailStr = `${d.number[0]} + ${d.number[1]} = ${d.tong} (Đơn vị: ${d.don_vi})`;
                    detailP.innerText = detailStr; // Hiển thị chi tiết (ví dụ: a+b=tong (Đơn vị: x))
                    resultH2.innerText = d.win ? 'THẮNG 🎉' : 'THUA 💀'; // Hiển thị kết quả thắng/thua
                    resultH2.className = d.win ? 'win' : 'lose'; // Thêm class màu
                    
                    // Reset các ô nhập sau khi chơi xong
                    betInput.value = '';
                    choiceInput.selectedIndex = 0
